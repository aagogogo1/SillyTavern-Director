<div class="director-shell">
    <button id="director_floating_button" class="director-floating-button" type="button" aria-label="打开导演面板">
        <span class="director-floating-button-icon">导</span>
    </button>

    <div id="director_modal" class="director-modal" aria-hidden="true">
        <div class="director-modal-backdrop" data-director-close="true"></div>
        <div class="director-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="director_modal_title">
            <div class="director-modal-header">
                <div>
                    <div id="director_modal_title" class="director-modal-title">导演面板</div>
                    <div class="director-modal-subtitle">管理模型连接、故事情节和当前聊天注入。</div>
                </div>
                <button id="director_modal_close" class="director-modal-close" type="button" aria-label="关闭导演面板">×</button>
            </div>

            <div class="director-modal-body">
                <div class="director-settings">
                    <div class="director-drawer inline-drawer">
                        <div class="director-drawer-toggle inline-drawer-toggle inline-drawer-header">
                            <b>生成连接</b>
                            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
                        </div>
                        <div class="inline-drawer-content director-drawer-content">
                            <label class="director-field-row director-inline-toggle">
                                <input id="director_enabled" type="checkbox" />
                                <span>启用导演插件</span>
                            </label>

                            <label class="director-field-row">
                                <span>连接名称</span>
                                <input id="director_generation_connection_name" class="text_pole" type="text" placeholder="生成连接" />
                            </label>

                            <label class="director-field-row">
                                <span>Base URL</span>
                                <input id="director_generation_api_url" class="text_pole" type="text" placeholder="https://api.openai.com/v1" />
                            </label>

                            <label class="director-field-row">
                                <span>API Key</span>
                                <input id="director_generation_api_key" class="text_pole" type="password" placeholder="sk-..." />
                            </label>

                            <label class="director-field-row">
                                <span>模型名称</span>
                                <input id="director_generation_model_name" class="text_pole" type="text" placeholder="可手动填写，也可从下方模型列表选择" />
                            </label>

                            <label class="director-field-row">
                                <span>已拉取模型列表</span>
                                <select id="director_generation_model_select" class="text_pole"></select>
                            </label>

                            <div class="director-button-row">
                                <button id="director_save_generation_connection" class="menu_button" type="button">保存</button>
                                <button id="director_fetch_generation_models" class="menu_button" type="button">查询模型</button>
                                <button id="director_clone_generation_to_analysis" class="menu_button" type="button">克隆到分析连接</button>
                            </div>

                            <div id="director_generation_connection_status" class="director-status director-status-info">先填写 URL 和 API Key，再查询模型列表。</div>
                        </div>
                    </div>

                    <div class="director-drawer inline-drawer">
                        <div class="director-drawer-toggle inline-drawer-toggle inline-drawer-header">
                            <b>分析连接</b>
                            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
                        </div>
                        <div class="inline-drawer-content director-drawer-content">
                            <label class="director-field-row">
                                <span>连接名称</span>
                                <input id="director_analysis_connection_name" class="text_pole" type="text" placeholder="分析连接" />
                            </label>

                            <label class="director-field-row">
                                <span>Base URL</span>
                                <input id="director_analysis_api_url" class="text_pole" type="text" placeholder="https://api.openai.com/v1" />
                            </label>

                            <label class="director-field-row">
                                <span>API Key</span>
                                <input id="director_analysis_api_key" class="text_pole" type="password" placeholder="sk-..." />
                            </label>

                            <label class="director-field-row">
                                <span>模型名称</span>
                                <input id="director_analysis_model_name" class="text_pole" type="text" placeholder="可手动填写，也可从下方模型列表选择" />
                            </label>

                            <label class="director-field-row">
                                <span>已拉取模型列表</span>
                                <select id="director_analysis_model_select" class="text_pole"></select>
                            </label>

                            <label class="director-field-row">
                                <span>分析携带聊天历史条数</span>
                                <input id="director_analysis_history_depth" class="text_pole" type="number" min="1" max="50" placeholder="10" />
                            </label>

                            <div class="director-button-row">
                                <button id="director_save_analysis_connection" class="menu_button" type="button">保存</button>
                                <button id="director_fetch_analysis_models" class="menu_button" type="button">查询模型</button>
                                <button id="director_clone_analysis_to_generation" class="menu_button" type="button">克隆到生成连接</button>
                            </div>

                            <div id="director_analysis_connection_status" class="director-status director-status-info">先填写 URL 和 API Key，再查询模型列表。</div>
                        </div>
                    </div>

                    <div class="director-drawer inline-drawer is-open">
                        <div class="director-drawer-toggle inline-drawer-toggle inline-drawer-header">
                            <b>情节列表</b>
                            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
                        </div>
                        <div class="inline-drawer-content director-drawer-content">
                            <div id="director_chat_scope" class="director-chat-scope"></div>

                            <div class="director-feature-toggles">
                                <label class="director-field-row director-inline-toggle">
                                    <input id="director_anti_spoiler" type="checkbox" />
                                    <span>防劇透（隐藏情节内容）</span>
                                </label>
                                <label class="director-field-row director-inline-toggle">
                                    <input id="director_auto_generate_plot" type="checkbox" />
                                    <span>自动生成情节（倒数第二节点触发时）</span>
                                </label>
                            </div>

                            <div class="director-button-row">
                                <button id="director_add_plot" class="menu_button" type="button">新增情节</button>
                            </div>

                            <div id="director_add_plot_form" class="director-add-plot-form" style="display:none;">
                                <label class="director-field-row">
                                    <textarea id="director_plot_description" class="text_pole" rows="3" placeholder="描述你想推进的情节内容，AI 将据此生成节点序列。涉及主角时写 &lt;user&gt;。"></textarea>
                                </label>
                                <label class="director-field-row director-inline-field">
                                    <span>节点数：</span>
                                    <input id="director_node_generation_count" class="text_pole" type="number" min="1" max="20" value="4" style="width:60px;" />
                                </label>
                                <label class="director-field-row director-inline-field">
                                    <span>参考聊天条数：</span>
                                    <input id="director_generation_history_depth" class="text_pole" type="number" min="1" max="100" value="10" style="width:60px;" />
                                </label>
                                <div class="director-button-row">
                                    <button id="director_confirm_add_plot" class="menu_button" type="button">确认生成</button>
                                </div>
                            </div>

                            <div id="director_plot_list" class="director-plot-list"></div>

                            <div class="director-drawer inline-drawer director-archive-drawer" style="display:none;">
                                <div class="director-drawer-toggle inline-drawer-toggle inline-drawer-header">
                                    <b>归档情节</b>
                                    <span id="director_archive_count" class="director-chip" style="margin-left:6px;">0</span>
                                    <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
                                </div>
                                <div class="inline-drawer-content director-drawer-content" style="padding-top:8px;">
                                    <div id="director_archive_list" class="director-plot-list"></div>
                                </div>
                            </div>

                            <div class="director-button-row" style="margin-top:4px;">
                                <button id="director_run_analysis" class="menu_button" type="button">立即分析节点</button>
                            </div>
                            <div id="director_analysis_status" class="director-status director-status-info">大模型每次回复后会自动分析；也可点击上方按钮立即刷新。</div>

                            <div class="director-section-title">最近命中的节点</div>
                            <div id="director_last_matches" class="director-chip-list"></div>

                            <label class="director-field-row">
                                <span>注入预览</span>
                                <textarea id="director_injection_preview" class="text_pole" rows="10" readonly></textarea>
                            </label>

                        </div>
                    </div>

                    <div class="director-drawer inline-drawer">
                        <div class="director-drawer-toggle inline-drawer-toggle inline-drawer-header">
                            <b>提示词设置</b>
                            <div class="inline-drawer-icon fa-solid fa-circle-chevron-down down"></div>
                        </div>
                        <div class="inline-drawer-content director-drawer-content">
                            <label class="director-field-row">
                                <span>情节节点生成系统提示词</span>
                                <textarea id="director_generation_prompt" class="text_pole" rows="10"></textarea>
                            </label>
                            <label class="director-field-row">
                                <span>附加提示词（选填，追加到上方提示词末尾）</span>
                                <textarea id="director_generation_prompt_extra" class="text_pole" rows="4" placeholder="在此输入你想要的额外指示，不影响默认提示词。"></textarea>
                            </label>
                            <label class="director-field-row">
                                <span>节点分析系统提示词</span>
                                <textarea id="director_analysis_prompt" class="text_pole" rows="10"></textarea>
                            </label>
                            <label class="director-field-row">
                                <span>附加提示词（选填，追加到上方提示词末尾）</span>
                                <textarea id="director_analysis_prompt_extra" class="text_pole" rows="4" placeholder="在此输入你想要的额外指示，不影响默认提示词。"></textarea>
                            </label>
                            <label class="director-field-row">
                                <span>最终注入模板</span>
                                <textarea id="director_injection_prompt" class="text_pole" rows="8"></textarea>
                            </label>
                            <label class="director-field-row">
                                <span>附加提示词（选填，追加到上方提示词末尾）</span>
                                <textarea id="director_injection_prompt_extra" class="text_pole" rows="3" placeholder="在此输入你想要的额外指示，不影响默认提示词。"></textarea>
                            </label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="director-modal-footer">
                <button id="director_modal_close_bottom" class="menu_button director-modal-footer-close" type="button">关闭</button>
            </div>
        </div>
    </div>
</div>
